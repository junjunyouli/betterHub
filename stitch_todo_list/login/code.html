<style>
        body {
            background-color: #f8fafb;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }
        .soft-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .ambient-shadow {
            box-shadow: 0 16px 32px -8px rgba(0, 108, 77, 0.08);
        }
        .input-focus-effect:focus-within {
            border-bottom-color: #006c4d;
            background-color: #ffffff;
        }
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }

<body class="bg-surface text-on-surface flex flex-col min-h-screen">
<!-- Subtle Background Elements -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute top-[-10%] right-[-10%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-[80px]"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[300px] h-[300px] bg-secondary-container/20 rounded-full blur-[60px]"></div>
</div>
<!-- Main Login Container -->
<main class="flex-grow flex items-center justify-center px-margin-mobile relative z-10">
<div class="w-full max-w-[420px] fade-in">
<!-- Brand Identity -->
<div class="text-center mb-xl">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary-container/20 rounded-[24px] mb-lg">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">
                        task_alt
                    </span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Your mindful day starts here.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-[32px] p-lg md:p-xl ambient-shadow">
<form class="space-y-lg">
<!-- Email Field -->
<div class="space-y-xs group">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative flex items-center transition-all duration-300 border-b-2 border-surface-container-highest bg-surface-container-low/50 rounded-t-xl px-md py-sm input-focus-effect">
<span class="material-symbols-outlined text-outline mr-sm text-[20px]">mail</span>
<input class="bg-transparent border-none focus:ring-0 w-full font-body-md text-body-md text-on-surface placeholder:text-outline-variant p-0" id="email" placeholder="name@example.com" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs group">
<div class="flex justify-between items-center px-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:opacity-80 transition-opacity" href="#">Forgot?</a>
</div>
<div class="relative flex items-center transition-all duration-300 border-b-2 border-surface-container-highest bg-surface-container-low/50 rounded-t-xl px-md py-sm input-focus-effect">
<span class="material-symbols-outlined text-outline mr-sm text-[20px]">lock</span>
<input class="bg-transparent border-none focus:ring-0 w-full font-body-md text-body-md text-on-surface placeholder:text-outline-variant p-0" id="password" placeholder="••••••••" type="password">
<button class="text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<div class="pt-base">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-lg rounded-full shadow-lg shadow-primary/20 hover:shadow-xl hover:scale-[1.01] active:scale-[0.98] transition-all duration-200">
                            Login
                        </button>
</div>
<!-- Social Login Divider -->

<!-- Social Buttons -->

</form>
</div>
<!-- Sign Up Link -->
<div class="text-center mt-xl">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    New to Daily Bloom? 
                    <a class="text-primary font-label-md text-label-md ml-xs hover:underline underline-offset-4 decoration-2 decoration-primary/30 transition-all" href="#">Create an account</a>
</p>
</div>
</div>
</main>
<!-- Visual Accent: Bottom Illustration -->
<div class="hidden md:flex justify-center pb-xl opacity-80 pointer-events-none">
<div class="relative w-full max-w-2xl px-xl">
<div class="bg-surface-container p-xl rounded-[40px] flex items-center justify-between">
<div class="space-y-sm">
<div class="flex items-center gap-base">

</div>

<!-- Custom Micro-interaction Script -->
<script>
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('shadow-inner');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('shadow-inner');
            });
        });

        // Simple button press feedback
        const loginBtn = document.querySelector('button');
        loginBtn.addEventListener('mousedown', () => {
            loginBtn.style.transform = 'scale(0.97)';
        });
        loginBtn.addEventListener('mouseup', () => {
            loginBtn.style.transform = 'scale(1.01)';
        });
    </script>


</body></html>
