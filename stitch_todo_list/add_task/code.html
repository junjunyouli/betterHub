<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="utf-8">
		<meta content="width=device-width, initial-scale=1.0" name="viewport">
		<link
			href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
			rel="stylesheet"
		>
		<link
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
			rel="stylesheet"
		>
		<link
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
			rel="stylesheet"
		>
		<script
			src="https://cdn.tailwindcss.com?plugins=forms,container-queries"
		></script>
		<script id="tailwind-config">
		"use strict";
		tailwind.config = {
			darkMode: "class",
			theme: {
				extend: {
					colors: {
						"tertiary-container": "#92a5a1",
						"inverse-on-surface": "#eff1f2",
						"surface-variant": "#e1e3e4",
						"on-secondary-fixed": "#001f2a",
						"on-secondary-fixed-variant": "#004d65",
						"inverse-primary": "#69dbad",
						"error-container": "#ffdad6",
						"surface-container-lowest": "#ffffff",
						outline: "#6d7a72",
						"tertiary-fixed-dim": "#b7cbc6",
						secondary: "#0d6683",
						"primary-container": "#3eb489",
						"surface-bright": "#f8fafb",
						surface: "#f8fafb",
						"on-secondary-container": "#056380",
						"surface-tint": "#006c4d",
						"secondary-fixed": "#bee9ff",
						"secondary-fixed-dim": "#8ad0f1",
						error: "#ba1a1a",
						"on-background": "#191c1d",
						"on-tertiary": "#ffffff",
						"primary-fixed": "#86f8c8",
						"on-surface-variant": "#3d4943",
						"on-primary-fixed-variant": "#005139",
						"surface-dim": "#d8dadb",
						"surface-container": "#eceeef",
						"on-surface": "#191c1d",
						"on-tertiary-container": "#2a3b38",
						"surface-container-high": "#e6e8e9",
						"secondary-container": "#98deff",
						"on-tertiary-fixed": "#0d1f1c",
						"on-primary": "#ffffff",
						background: "#f8fafb",
						"on-primary-container": "#00402d",
						"on-secondary": "#ffffff",
						"inverse-surface": "#2e3132",
						"surface-container-low": "#f2f4f5",
						"outline-variant": "#bccac1",
						"on-tertiary-fixed-variant": "#394a47",
						"on-primary-fixed": "#002115",
						"primary-fixed-dim": "#69dbad",
						"tertiary-fixed": "#d3e7e2",
						tertiary: "#50625e",
						primary: "#006c4d",
						"surface-container-highest": "#e1e3e4",
						"on-error": "#ffffff",
						"on-error-container": "#93000a",
					},
					borderRadius: {
						DEFAULT: "0.25rem",
						lg: "0.5rem",
						xl: "0.75rem",
						full: "9999px",
					},
					spacing: {
						lg: "24px",
						base: "4px",
						sm: "8px",
						md: "16px",
						"margin-mobile": "20px",
						xs: "4px",
						xl: "32px",
						gutter: "16px",
					},
					fontFamily: {
						"body-md": ["Plus Jakarta Sans"],
						"body-lg": ["Plus Jakarta Sans"],
						"label-sm": ["Plus Jakarta Sans"],
						"label-md": ["Plus Jakarta Sans"],
						"headline-xl": ["Plus Jakarta Sans"],
						"body-sm": ["Plus Jakarta Sans"],
						"headline-lg-mobile": ["Plus Jakarta Sans"],
						"headline-lg": ["Plus Jakarta Sans"],
					},
					fontSize: {
						"body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
						"body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
						"label-sm": ["10px", { lineHeight: "14px", fontWeight: "500" }],
						"label-md": [
							"12px",
							{
								lineHeight: "16px",
								letterSpacing: "0.02em",
								fontWeight: "600",
							},
						],
						"headline-xl": [
							"32px",
							{
								lineHeight: "40px",
								letterSpacing: "-0.02em",
								fontWeight: "700",
							},
						],
						"body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
						"headline-lg-mobile": [
							"22px",
							{ lineHeight: "28px", fontWeight: "600" },
						],
						"headline-lg": [
							"24px",
							{
								lineHeight: "32px",
								letterSpacing: "-0.01em",
								fontWeight: "600",
							},
						],
					},
				},
			},
		};
		</script>
		<style>
		.material-symbols-outlined {
			display: inline-block;
			font-variation-settings:
				"FILL" 0,
				"wght" 400,
				"GRAD" 0,
				"opsz" 24;
			vertical-align: middle;
		}
		.bottom-sheet-slide-up {
			animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
		}
		@keyframes slideUp {
			from {
				transform: translateY(100%);
			}
			to {
				transform: translateY(0);
			}
		}
		.backdrop-fade-in {
			animation: fadeIn 0.3s ease-out forwards;
		}
		@keyframes fadeIn {
			from {
				opacity: 0;
			}
			to {
				opacity: 1;
			}
		}
		</style>
		<style>
		body {
			min-height: max(884px, 100dvh);
		}
		</style>
	</head>
	<body class="bg-surface font-body-md text-on-surface">
		<!-- Mock Background Content (Task List Preview) -->
		<main class="min-h-screen px-margin-mobile pt-32 pb-24">
			<header
				class="fixed top-0 left-0 w-full bg-surface/80 backdrop-blur-md z-40 px-margin-mobile py-sm flex justify-between items-center"
			>
				<h1
					class="font-headline-lg-mobile text-headline-lg-mobile font-semibold text-primary"
				>
					Daily Bloom
				</h1>
				<div
					class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center overflow-hidden"
				>
					<img
						class="w-full h-full object-cover"
						data-alt="A soft-focus portrait of a young professional woman smiling in a bright, modern studio with clean mint green accents and natural sunlight. The aesthetic is airy and mindful, matching the Xiao Qing Xin modern style."
						src="https://lh3.googleusercontent.com/aida-public/AB6AXuCeckToPiVv2JbMEC0eSbAkA4issEfOf9WcOZsUwNd23VwZNarU32ZlU3jLkEJ-OooUTGgzs8u8wALc85U2qPZAGsr93Qq683k944rhgxcBHSF8Rrxa3aylxw4nn1fHiYAvbZk_sKDJ-hzDHtcRkG5DMnoDCIa3EpbrW1pJcUC6V9wsWAk4Lrx7jiXXK9aVEoWx-FojNBlaBUKoYJzqHK307z8FPN7EJXIT08LVP8leBWTJKuixOYuPg19mYfYp97HGcVk2darqaZo"
					>
				</div>
			</header>
			<section class="mt-8 space-y-md">
				<div
					class="p-md bg-surface-container-low rounded-xl shadow-sm border border-outline-variant/20"
				>
					<div class="flex items-center gap-md">
						<span
							class="material-symbols-outlined text-primary"
							style="font-variation-settings: 'FILL' 0;"
							>radio_button_unchecked</span
						>
						<div>
							<p class="font-body-md text-on-surface">整理书桌</p>
							<p class="font-label-sm text-on-surface-variant">
								个人 • 10:00 AM
							</p>
						</div>
					</div>
				</div>
				<div
					class="p-md bg-surface-container-low rounded-xl shadow-sm border border-outline-variant/20"
				>
					<div class="flex items-center gap-md">
						<span
							class="material-symbols-outlined text-primary"
							style="font-variation-settings: 'FILL' 0;"
							>radio_button_unchecked</span
						>
						<div>
							<p class="font-body-md text-on-surface">瑜伽练习</p>
							<p class="font-label-sm text-on-surface-variant">
								健康 • 07:30 AM
							</p>
						</div>
					</div>
				</div>
			</section>
		</main>
		<!-- Bottom Navigation Mock -->
		<nav
			class="fixed bottom-0 left-0 w-full flex justify-around items-center px-gutter pb-6 pt-2 bg-surface/90 backdrop-blur-lg rounded-t-xl z-40"
		>
			<div
				class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-5 py-1.5"
			>
				<span class="material-symbols-outlined">task_alt</span>
				<span class="font-label-md text-label-md">Tasks</span>
			</div>
			<div
				class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1.5"
			>
				<span class="material-symbols-outlined">calendar_today</span>
				<span class="font-label-md text-label-md">Calendar</span>
			</div>
			<div
				class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1.5"
			>
				<span class="material-symbols-outlined">self_care</span>
				<span class="font-label-md text-label-md">Focus</span>
			</div>
			<div
				class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1.5"
			>
				<span class="material-symbols-outlined">person</span>
				<span class="font-label-md text-label-md">Profile</span>
			</div>
		</nav>
		<!-- Add Task Bottom Sheet Modal -->
		<div
			class="fixed inset-0 z-50 flex flex-col justify-end"
			id="bottom-sheet-overlay"
		>
			<!-- Backdrop -->
			<div
				class="absolute inset-0 bg-on-background/30 backdrop-blur-sm backdrop-fade-in"
				onclick="closeModal()"
			></div>
			<!-- Sheet Content -->
			<div
				class="relative bg-surface rounded-t-[28px] px-margin-mobile pt-sm pb-10 bottom-sheet-slide-up shadow-[0_-10px_40px_rgba(0,108,77,0.1)]"
			>
				<!-- Drag Handle / Close -->
				<div class="flex justify-center mb-md">
					<div class="w-12 h-1.5 bg-outline-variant/30 rounded-full"></div>
				</div>
				<!-- Header -->
				<div class="flex justify-between items-center mb-xl">
					<h2
						class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface font-semibold"
					>
						新增任务
					</h2>
					<button
						class="w-8 h-8 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface-variant hover:opacity-80 transition-opacity"
						onclick="closeModal()"
					>
						<span class="material-symbols-outlined text-[20px]">close</span>
					</button>
				</div>
				<!-- Form -->
				<div class="space-y-xl">
					<!-- Task Name Input -->
					<div class="group">
						<label class="font-label-md text-label-md text-primary mb-xs block"
							>任务名称</label
						>
						<input
							class="w-full bg-transparent border-none p-0 focus:ring-0 text-headline-lg-mobile font-body-md placeholder:text-outline-variant/60 text-on-surface"
							placeholder="想要完成什么？"
							type="text"
						>
						<div
							class="h-[1.5px] w-full bg-primary-container/30 group-focus-within:bg-primary transition-colors mt-2"
						></div>
					</div>
					<!-- Category Selection -->
					<div>
						<p
							class="font-label-md text-label-md text-on-surface-variant mb-md"
						>
							选择分类
						</p>
						<div class="flex flex-wrap gap-sm">
							<button
								class="px-md py-sm rounded-full bg-primary-container text-on-primary-container font-label-md flex items-center gap-xs"
							>
								<span class="material-symbols-outlined text-[18px]">work</span>
								Work
							</button>
							<button
								class="px-md py-sm rounded-full bg-surface-container-high text-on-surface-variant font-label-md flex items-center gap-xs hover:bg-surface-container-highest transition-colors"
							>
								<span class="material-symbols-outlined text-[18px]"
									>person</span
								>
								Personal
							</button>
							<button
								class="px-md py-sm rounded-full bg-surface-container-high text-on-surface-variant font-label-md flex items-center gap-xs hover:bg-surface-container-highest transition-colors"
							>
								<span class="material-symbols-outlined text-[18px]">home</span>
								Home
							</button>
							<button
								class="px-md py-sm rounded-full bg-surface-container-high text-on-surface-variant font-label-md flex items-center gap-xs hover:bg-surface-container-highest transition-colors"
							>
								<span class="material-symbols-outlined text-[18px]"
									>favorite</span
								>
								Health
							</button>
						</div>
					</div>
					<!-- Time & Date -->
					<div>
						<p
							class="font-label-md text-label-md text-on-surface-variant mb-md"
						>
							截止时间
						</p>
						<div class="flex gap-sm">
							<button
								class="flex-1 py-md rounded-xl bg-surface-container-low border border-outline-variant/30 text-on-surface font-body-sm flex flex-col items-center justify-center gap-base active:scale-95 transition-transform"
							>
								<span class="material-symbols-outlined text-primary"
									>today</span
								>
								<span>今天</span>
							</button>
							<button
								class="flex-1 py-md rounded-xl bg-surface-container-low border border-outline-variant/30 text-on-surface font-body-sm flex flex-col items-center justify-center gap-base active:scale-95 transition-transform"
							>
								<span class="material-symbols-outlined text-secondary"
									>event_repeat</span
								>
								<span>明天</span>
							</button>
							<button
								class="flex-1 py-md rounded-xl bg-surface-container-low border border-outline-variant/30 text-on-surface font-body-sm flex flex-col items-center justify-center gap-base active:scale-95 transition-transform"
							>
								<span class="material-symbols-outlined text-tertiary"
									>schedule</span
								>
								<span>选择时间</span>
							</button>
						</div>
					</div>
					<!-- Add Task Button -->
					<button
						class="w-full py-lg bg-primary-container text-on-primary-container font-headline-lg-mobile rounded-full shadow-lg shadow-primary-container/20 flex items-center justify-center gap-sm active:scale-[0.98] transition-all hover:brightness-105"
						onclick="submitTask()"
					>
						<span class="material-symbols-outlined">add_task</span>
						添加任务
					</button>
				</div>
			</div>
		</div>
		<script>
		"use strict";
		function closeModal() {
			const overlay = document.getElementById("bottom-sheet-overlay");
			const sheet = overlay.querySelector(".bottom-sheet-slide-up");
			const backdrop = overlay.querySelector(".backdrop-fade-in");

			// Animation out
			sheet.style.transform = "translateY(100%)";
			sheet.style.transition = "transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)";
			backdrop.style.opacity = "0";
			backdrop.style.transition = "opacity 0.3s ease-out";

			setTimeout(() => {
				overlay.classList.add("hidden");
			}, 300);
		}

		function submitTask() {
			// Micro-interaction for feedback
			const btn = event.currentTarget;
			btn.innerHTML =
				'<span class="material-symbols-outlined animate-spin">refresh</span> 正在保存...';
			setTimeout(() => {
				closeModal();
				// Reset button text for next time
				btn.innerHTML =
					'<span class="material-symbols-outlined">add_task</span> 添加任务';
			}, 800);
		}

		// Handle category selection toggle logic
		document.querySelectorAll("button.font-label-md").forEach((btn) => {
			btn.addEventListener("click", function () {
				// Clear other active states
				this.parentElement.querySelectorAll("button").forEach((b) => {
					b.classList.remove(
						"bg-primary-container",
						"text-on-primary-container"
					);
					b.classList.add(
						"bg-surface-container-high",
						"text-on-surface-variant"
					);
				});
				// Set current as active
				this.classList.remove(
					"bg-surface-container-high",
					"text-on-surface-variant"
				);
				this.classList.add("bg-primary-container", "text-on-primary-container");
			});
		});
		</script>
	</body>
</html>
