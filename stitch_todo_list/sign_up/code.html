<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafb;
            color: #191c1d;
            -webkit-font-smoothing: antialiased;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .soft-shadow {
            box-shadow: 0 16px 32px -8px rgba(0, 108, 77, 0.06);
        }
        .input-focus-ring:focus {
            outline: none;
            border-bottom-color: #006c4d;
            background-color: #ffffff;
        }
        .floating-label-input:placeholder-shown + label {
            opacity: 0;
            transform: translateY(10px);
        }
        .floating-label-input:not(:placeholder-shown) + label {
            opacity: 1;
            transform: translateY(0);
        }
        .transition-all-custom {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>

<body class="flex items-center justify-center min-h-screen p-margin-mobile overflow-x-hidden">
<!-- Atmospheric Background Decoration -->
<div class="fixed inset-0 z-0 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-secondary-fixed/30 rounded-full blur-[120px] opacity-40"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-primary-fixed/20 rounded-full blur-[150px] opacity-30"></div>
</div>
<!-- Main Signup Container -->
<main class="relative z-10 w-full max-w-[440px]" style="opacity: 1; transform: translateY(0px); transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1);">
<!-- Back Navigation -->
<nav class="mb-lg flex items-center">
<button class="group flex items-center gap-2 text-on-surface-variant hover:text-primary transition-all-custom">
<span class="material-symbols-outlined text-[20px] group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">arrow_back</span>
<span class="font-label-md text-label-md">Return to Login</span>
</button>
</nav>
<!-- Brand Identity Section -->
<header class="mb-xl px-2">
<h1 class="font-headline-xl text-headline-xl text-on-background tracking-tight mb-sm">
                Create Account
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                Join our community of mindful growers and start your daily bloom journey.
            </p>
</header>
<!-- Signup Form Card -->
<div class="glass-card soft-shadow rounded-xl p-lg sm:p-xl animate-fade-in-up">
<form action="#" class="space-y-lg" method="POST">
<!-- Name Field -->
<div class="relative">
<input class="floating-label-input w-full bg-surface-container-low border-0 border-b-2 border-transparent py-md px-md rounded-t-lg font-body-md text-body-md transition-all-custom input-focus-ring placeholder:text-outline/60" id="name" name="name" placeholder="Full Name" required="" type="text">
<label class="absolute left-md -top-2 text-label-sm font-label-sm text-primary transition-all-custom" for="name">Full Name</label>
</div>
<!-- Email Field -->
<div class="relative">
<input class="floating-label-input w-full bg-surface-container-low border-0 border-b-2 border-transparent py-md px-md rounded-t-lg font-body-md text-body-md transition-all-custom input-focus-ring placeholder:text-outline/60" id="email" name="email" placeholder="Email Address" required="" type="email">
<label class="absolute left-md -top-2 text-label-sm font-label-sm text-primary transition-all-custom" for="email">Email Address</label>
</div>
<!-- Password Field -->
<div class="relative">
<input class="floating-label-input w-full bg-surface-container-low border-0 border-b-2 border-transparent py-md px-md rounded-t-lg font-body-md text-body-md transition-all-custom input-focus-ring placeholder:text-outline/60" id="password" name="password" placeholder="Create Password" required="" type="password">
<label class="absolute left-md -top-2 text-label-sm font-label-sm text-primary transition-all-custom" for="password">Create Password</label>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 px-1">
<input class="mt-1 w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary-container transition-all-custom" id="terms" required="" type="checkbox">
<label class="font-body-sm text-body-sm text-on-surface-variant leading-snug" for="terms">
                        I agree to the <a class="text-primary font-semibold hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-semibold hover:underline" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary hover:bg-on-primary-fixed-variant text-on-primary font-headline-lg-mobile text-headline-lg-mobile py-lg rounded-full soft-shadow transform active:scale-[0.98] transition-all-custom flex items-center justify-center gap-3" type="submit">
                    Create Account
                    <span class="material-symbols-outlined text-[20px]" data-icon="chevron_right">chevron_right</span>
</button>
</form>
<!-- Social Signup Divider -->

<!-- Social Buttons Grid -->

</div>
<!-- Secondary Imagery Context -->
<section class="mt-xl grid grid-cols-2 gap-md opacity-80 hover:opacity-100 transition-opacity duration-500">
<div class="h-32 rounded-xl overflow-hidden shadow-sm">
<img class="w-full h-full object-cover" data-alt="A macro close-up of a fresh green plant leaf covered in sparkling morning dew drops. The background is a soft, dreamlike blur of mint green and sky blue, creating a tranquil and refreshing atmosphere consistent with a minimalist design aesthetic. Sunlight filters through gently, casting a warm and hopeful glow on the foliage." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAq0EYMx5dxI9sIj_b2jq-Zf0bMYA4Uw884gN_Z2WrqpAN0AHS8LOI3iy26lCbMTWhix2dQJ87EF9FF-QaMxnNfUcDxIcvb-EviC6hHvrTFLPQ345FqVlUBqmSSTNU8cc7Jc35W-PFXOXlOhfFzgiIPqKhpxqcE9eYT-VZ2IDnEgweKfZPbH88oTDAYkA-UladM1NYViP0mP6ouROaVtgTDSE_GLVQIvvZeWPPoiyrQzeU6pfa0y293UwjSJg8f3XFUFHbXxkyaWCo">
</div>
<div class="h-32 rounded-xl overflow-hidden shadow-sm">
<img class="w-full h-full object-cover" data-alt="A candid, high-angle shot of a minimalist wooden desk featuring a clean white notebook, a ceramic mug of tea, and a small potted succulent. The lighting is bright and airy, reflecting a high-key lifestyle photography style. The color palette is dominated by neutral whites, soft grays, and natural wood tones with a pop of fresh green from the plant." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAe-QORLiuaJmvzefKFwkUVQkKvQlh0ZzUi4V1HWSDdFzdIqgV0CJcyEspnpDw5I3UQGIbB_sOl10KmZv0OSwHwSZ73Xe1dsWX8reqwUWp1vRyHT1ZpIb0VR-VJByoecU0CAz_iFE9KAb_gTJ7F_-M9PwN98JWoTUI4ssCcsY0PLiP-vrkrQUqlO_jskhcmMKm0R70FuzP2F2cJgQw1KZkZItaXPUj3Ab1UppdkSTMOlCXBo9u_6IoC80SxZaTrL6DfPt_qUQSdfew">
</div>
</section>
<!-- Footer -->
<footer class="mt-xl text-center">
<p class="font-body-sm text-body-sm text-outline">
                Already have an account? <a class="text-primary font-bold hover:underline" href="#">Log in</a>
</p>
</footer>
</main>
<script>
        // Micro-interactions for form focus
        document.querySelectorAll('.floating-label-input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.02]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.02]');
            });
        });

        // Simple entrance animation
        window.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('main');
            container.style.opacity = '0';
            container.style.transform = 'translateY(20px)';
            container.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
            
            setTimeout(() => {
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>


</body></html>
